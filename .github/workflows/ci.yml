name: Minimal JS CI

on:
  push:
    branches: [ main, ci/pipeline, sorting ]
  pull_request:
    branches: [ main, ci/pipeline, sorting ]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        type: choice
        options:
        - build
        - dev
        required: true
        default: build
      deploy:
        description: 'Should deploy'
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.mode }}

    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v3

      - name: Устанавливаем Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Установка зависимостей
        run: npm ci

      - name: Сборка проекта
        run: npm run ${{ inputs.mode }}

#      - name: Копируем всё из src в dist (кроме уже собранных файлов)
#        run: |
#          rsync -av \
#            --exclude='scripts/mkb.js' \
#            --exclude='css/main.css' \
#            --exclude='mkb/index.html' \
#          src/ dist/

      - name: Запуск тестов
        run: npm test

      - name: Publish (копируем файлы из dist в publish)
        run: |
          rm -rf publish
          mkdir publish
          cp -r dist/* publish/

      - name: Upload to server via FTP
        if: ${{ inputs.deploy }}
        uses: airvzxf/ftp-deployment-action@latest
        with:
          server: '31.31.197.14:21'
          user: ${{ vars.FTP_USERNAME }}
          password: 'OPRn8hHC1azx6O95'
          local_dir: 'publish/'
          remote_dir: ${{ vars.DEPLOYMENT_DIRECTORY }}
          delete: 'true'
          max_retries: '3'

